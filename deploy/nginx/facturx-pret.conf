# ─── facturx-pret.fr ─────────────────────────────────────────────
# Frontend: facturx-pret.fr -> 127.0.0.1:3004
# API:      api.facturx-pret.fr -> 127.0.0.1:8004

# Rate limiting
limit_req_zone $binary_remote_addr zone=facturx_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=facturx_upload:10m rate=2r/s;

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name facturx-pret.fr www.facturx-pret.fr api.facturx-pret.fr;
    return 301 https://$host$request_uri;
}

# ─── Frontend: facturx-pret.fr ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name facturx-pret.fr www.facturx-pret.fr;

    ssl_certificate     /etc/letsencrypt/live/facturx-pret.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facturx-pret.fr/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── API: api.facturx-pret.fr ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.facturx-pret.fr;

    ssl_certificate     /etc/letsencrypt/live/facturx-pret.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facturx-pret.fr/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # File upload limit (50MB for invoice files)
    client_max_body_size 55M;

    # Rate limiting
    location /api/v1/invoice/upload {
        limit_req zone=facturx_upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/v1/invoice/convert {
        limit_req zone=facturx_upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/v1/invoice/batch {
        limit_req zone=facturx_upload burst=3 nodelay;
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        limit_req zone=facturx_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
