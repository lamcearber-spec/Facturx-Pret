version: "3.8"

services:
  api:
    build: ./api
    container_name: facturx-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8000"
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: ./web
    container_name: facturx-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.facturx-pret.fr}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://facturx-pret.fr}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uploads:
